<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cricket Legends</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <div class="image-area">
      <img id="playerImg" class="player-img" alt="Cricketer">
    </div>
    <div class="details">
      <h2 id="playerName">--</h2>
      <p class="country" id="playerCountry">--</p>
      <div class="info">
        <p><strong>Debut:</strong> <span id="debut">--</span></p>
        <p><strong>Retirement:</strong> <span id="retirement">--</span></p>
        <p><strong>Age:</strong> <span id="age">--</span> yrs</p>
      </div>
      <div class="buttons">
        <button id="prevBtn">◀ Previous</button>
        <button id="nextBtn">Next ▶</button>
      </div>
      <p class="counter" id="counter">0 / 0</p>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
